version: "3.0"
services:
  server:
    container_name: ssamantle-server-dev
    image: ssamantle-server:dev
    build:
      context: .
      dockerfile: Dockerfile
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
          initial_sync: true
        - action: rebuild
          path: requirements.txt
    restart: unless-stopped
    depends_on: [redis, postgres]
    ports: ["${GAME_SERVER_PORT}:8000"]
    environment:
      - DEBUG=${DEBUG}
      - SECRET=${SECRET}
      - REDIS_URL=redis://${REDIS_HOST}:${REDIS_PORT}/0
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}

  redis:
    container_name: ssamantle-server-dev-redis
    image: redis:latest
    ports: ["${REDIS_PORT}:6379"]
    command: ["redis-server", "--appendonly", "yes"]

  postgres:
    container_name: ssamantle-server-dev-postgres
    image: postgres:latest
    volumes: ["dev_postgres_data:/var/lib/postgres/data"]
    ports: ["${DB_PORT}:5432"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semantle"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}

volumes:
  dev_postgres_data:
