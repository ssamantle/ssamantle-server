version: "3.0"
services:
  server:
    image: ssamantle-server:dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssamantle-dev-server
    ports:
      - 8000:8000
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_NAME=./data/semantle.db
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - server_data:/app/data
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    command: [ "redis-server", "--appendonly", "yes" ]
volumes:
  redis_data:
  server_data:
