version: "3.0"
services:
  server:
    container_name: ssamantle-server-dev
    image: ssamantle-server:dev
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [redis, postgres]
    ports: ["${GAME_SERVER_PORT}:8000"]
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}

  redis:
    container_name: ssamantle-server-dev-redis
    image: redis:latest
    ports: ["${REDIS_PORT}:6379"]
    command: ["redis-server", "--appendonly", "yes"]

  postgres:
    container_name: ssamantle-server-dev-postgres
    image: postgres:latest
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports: ["${DB_PORT}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semantle"]
      interval: 5s
      timeout: 5s
      retries: 5
