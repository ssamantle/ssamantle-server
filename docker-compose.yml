version: "3.0"
services:
  server:
    image: ssamantle-server:dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssamantle-dev-server
    ports:
      - 8000:8000
    depends_on:
      - redis
    restart: unless-stopped
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - 6380:6379
    volumes:
      - redis_data:/data
    command: [ "redis-server", "--appendonly", "yes" ]
volumes:
  redis_data:
