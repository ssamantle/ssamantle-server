version: "3.0"
services:
  server:
    image: ssamantle-server:dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssamantle-dev-server
    ports:
      - 8000:8000
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://semantle:semantle@postgres:5432/semantle
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - server_data:/app/data
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    command: [ "redis-server", "--appendonly", "yes" ]
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      - POSTGRES_DB=semantle
      - POSTGRES_USER=semantle
      - POSTGRES_PASSWORD=semantle
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U semantle" ]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  redis_data:
  server_data:
  postgres_data:
