version: "3.0"
services:
  server:
    container_name: ssamantle-server-dev
    image: ssamantle-server:dev
    build:
      context: .
      dockerfile: Dockerfile
    ports: [8000:8000]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://semantle:semantle@postgres:5432/semantle
    depends_on: [redis, postgres]
    restart: unless-stopped

  redis:
    container_name: ssamantle-server-dev-redis
    image: redis:latest
    ports: [6379:6379]
    command: ["redis-server", "--appendonly", "yes"]

  postgres:
    container_name: ssamantle-server-dev-postgres
    image: postgres:latest
    environment:
      - POSTGRES_DB=semantle
      - POSTGRES_USER=semantle
      - POSTGRES_PASSWORD=semantle
    ports: [5432:5432]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semantle"]
      interval: 5s
      timeout: 5s
      retries: 5
